<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenDraw | Professional Drawing Academy</title>
    <meta name="description" content="A comprehensive workstation for building foundational drawing skills and muscle memory.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header>
                <h1>ZenDraw</h1>
                <p class="subtitle">Drawing Fundamentals</p>
            </header>

            <nav class="controls">
                <div class="control-group">
                    <label>Sheet Intensity</label>
                    <select id="difficulty">
                        <option value="easy">Low (Sparse)</option>
                        <option value="medium" selected>Normal</option>
                        <option value="hard">High (Dense)</option>
                    </select>
                </div>

                <div class="exercises-container">
                    <div class="label-row">
                        <label>Choose Exercises</label>
                        <div class="small-actions">
                            <span id="select-all">Select All</span>
                            <span id="deselect-all">Clear</span>
                        </div>
                    </div>

                    <!-- Category: Lines & Accuracy -->
                    <div class="category">
                        <h3>Lines & Accuracy</h3>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" id="type-straight" checked><span>Ghosted Lines</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-zigzag"><span>Precision Zigzags</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-chains"><span>Accuracy Chains</span></label>
                        </div>
                    </div>

                    <!-- Category: Flow & Rhythm -->
                    <div class="category">
                        <h3>Flow & Rhythm</h3>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" id="type-wavy" checked><span>S-Curves & Flow</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-ornament"><span>Rhythmic Meanders</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-ribbon"><span>Flowing Ribbons</span></label>
                        </div>
                    </div>

                    <!-- Category: Form & Perspective -->
                    <div class="category">
                        <h3>Form & Perspective</h3>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" id="type-spiral"><span>Confidence Ovals</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-planes"><span>Perspective Planes</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-contours"><span>Surface Contours</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-funnel"><span>Perspective Funnels</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-forms"><span>Form Intersections</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-organic"><span>Organic Forms</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-shadows"><span>Cast Shadows</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-boxes"><span>3D Boxes</span></label>
                        </div>
                    </div>

                    <!-- Category: Tone & Texture -->
                    <div class="category">
                        <h3>Tone & Texture</h3>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" id="type-intersect"><span>Tonal Hatching</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-pressure"><span>Pressure Tapers</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-gradient"><span>Density Gradients</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-textures"><span>Texture Patches</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-negative"><span>Negative Space</span></label>
                        </div>
                    </div>

                    <!-- Category: Biology & Anatomy -->
                    <div class="category">
                        <h3>Biology & Anatomy</h3>
                        <div class="checkbox-list">
                            <label class="checkbox-item"><input type="checkbox" id="type-face"><span>Facial Proportions</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-eye"><span>Eye Anatomy</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-hand"><span>Hand Framework</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-figure"><span>Figure Proportions</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-skull"><span>Skull Construction</span></label>
                            <label class="checkbox-item"><input type="checkbox" id="type-torso"><span>Torso Structure</span></label>
                        </div>
                    </div>
                </div>

                <div class="control-group">
                    <label>View Management</label>
                    <div class="zoom-controls">
                        <button id="zoom-out" title="Zoom Out">-</button>
                        <span id="zoom-level">100%</span>
                        <button id="zoom-in" title="Zoom In">+</button>
                        <button id="zoom-reset" class="small-btn">Reset</button>
                    </div>
                </div>

                <div class="button-group">
                    <button id="random-btn" class="tertiary-btn">Random Exercise</button>
                    <button id="generate-btn" class="primary-btn">New Exercise</button>
                    <button id="clear-btn" class="secondary-btn">Rest Sheet</button>
                </div>
            </nav>

            <footer>
                <p>Observe. Ghost. Draw.</p>
            </footer>
        </aside>

        <main class="canvas-area">
            <div class="canvas-wrapper">
                <canvas id="pattern-canvas"></canvas>
            </div>
            <div class="canvas-actions">
                <button id="download-btn" title="Export for Print">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>
            </div>
        </main>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
